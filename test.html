<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Comodatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h2>Dashboard - Comodatos</h2>
        <div id="msg" class="alert alert-info">Carregando...</div>
        <table id="tb" class="table table-striped table-bordered">
            <thead><tr><th>ID</th><th>Contrato</th><th>Cliente ID</th><th>Status</th><th>Data</th></tr></thead>
            <tbody id="body"></tbody>
        </table>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script>
(async () => {
    const msg = document.getElementById('msg');
    try {
        const url = new URL('https://sgp.net4you.com.br/api/estoque/comodato/list/');
        url.searchParams.set('data_cadastro_ini', '2026-04-01');
        url.searchParams.set('data_cadastro_fim', '2026-04-30');
        
        const resp = await fetch(url.toString(), {
            headers: { 'Authorization': 'Basic ' + btoa('robo:Ox(?YMae?0V3V#}HIGcF') }
        });
        const txt = await resp.text();
        console.log('Status:', resp.status, 'Length:', txt.length);
        
        if (!resp.ok) {
            throw new Error('HTTP ' + resp.status + ': ' + txt.substring(0, 200));
        }
        
        const data = JSON.parse(txt);
        if (!Array.isArray(data)) throw new Error('Não é array: ' + typeof data);
        
        msg.textContent = `Total: ${data.length} registros`;
        msg.className = 'alert alert-success';
        
        const tbody = document.getElementById('body');
        data.slice(0, 100).forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${d.id}</td><td>${d.contrato_id || '-'}</td><td>${d.cliente_id}</td><td>${d.status}</td><td>${d.data_cadastro?.substring(0,10)}</td>`;
            tbody.appendChild(tr);
        });
        
        $('#tb').DataTable({ pageLength: 25, language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json' } });
    } catch (e) {
        console.error(e);
        msg.textContent = 'Erro: ' + e.message;
        msg.className = 'alert alert-danger';
    }
})();
    </script>
</body>
</html>
